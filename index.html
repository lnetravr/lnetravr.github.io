<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>創新服務 | Product Launch</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { color: #2d3748; background: #fff; }
        .hero { background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://picsum.photos/1920/1080') no-repeat center center/cover; height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; padding: 0 20px; }
        .hero h1 { font-size: 3.5rem; font-weight: 800; margin-bottom: 20px; letter-spacing: -1px; }
        .hero p { font-size: 1.25rem; max-width: 600px; margin-bottom: 30px; color: #e2e8f0; }
        .cta-btn { background: #48bb78; color: white; padding: 12px 32px; border-radius: 50px; text-decoration: none; font-size: 1.1rem; font-weight: bold; box-shadow: 0 4px 14px rgba(72,187,120,0.4); transition: all 0.2s; }
        .cta-btn:hover { background: #38a169; transform: translateY(-2px); }
        .features { padding: 80px 20px; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        .feature-card { text-align: center; padding: 20px; }
        .feature-icon { font-size: 3rem; margin-bottom: 15px; }
        .feature-card h3 { font-size: 1.5rem; margin-bottom: 10px; color: #1a202c; }
        .feature-card p { color: #718096; line-height: 1.7; }
        footer { background: #1a202c; color: #a0aec0; text-align: center; padding: 40px 20px; font-size: 0.9rem; }
        scroll-behavior: smooth;
    </style>
</head>
<body>

    <section class="hero">
        <h1>打造超乎想像的數位體驗</h1>
        <p>一個幫你簡化工作流程、提升生產力的全新解決方案。現在就加入，開啟高效率的全新篇章。</p>
        <a href="https://www.google.com" target="_blank" class="cta-btn">立即免費體驗</a>
    </section>

    <section class="features">
        <div class="feature-card">
            <div class="feature-icon">⚡</div>
            <h3>極致速度</h3>
            <p>採用最新的優化技術，讓你的網頁與應用程式載入速度提升高達 200%。</p>
        </div>
        <div class="feature-columns feature-card">
            <div class="feature-icon">🔒</div>
            <h3>安全可靠</h3>
            <p>全面實施端到端加密與高規格資安防護，確保你的珍貴數據永不外洩。</p>
        </div>
        <div class="feature-card">
            <div class="feature-icon">📊</div>
            <h3>數據分析</h3>
            <p>內建精準的可視化數據看板，幫你一眼看穿關鍵指標，做出精準決策。</p>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Innovation Co. 保留所有權利。</p>
    </footer>

</body>
</html>
